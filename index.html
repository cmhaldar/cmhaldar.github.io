<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:#e8e0d0;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(212,175,55,0.12), transparent),
    repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(180,150,60,0.04) 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(180,150,60,0.04) 40px);
  display:flex;align-items:center;justify-content:center;
  padding:40px 20px;
  font-family:'Montserrat',sans-serif;
}

.card{
  width:100%;
  max-width:700px;
  background:#fdfaf4;
  border-radius:4px;
  border:1px solid #c9a84c;
  box-shadow:
    0 0 0 4px #fdfaf4,
    0 0 0 5px #c9a84c,
    0 40px 80px rgba(100,80,20,0.25),
    0 8px 24px rgba(100,80,20,0.15);
  overflow:hidden;
  position:relative;
  display:flex;
  flex-direction:row;
  min-height:340px;
  transition:transform 0.4s cubic-bezier(.2,.9,.3,1), box-shadow 0.4s;
}
.card:hover{
  transform:translateY(-6px) rotateX(1deg);
  box-shadow:
    0 0 0 4px #fdfaf4,
    0 0 0 5px #c9a84c,
    0 60px 100px rgba(100,80,20,0.3),
    0 12px 32px rgba(100,80,20,0.2);
}

/* Gold vertical accent bar */
.accent-bar{
  width:5px;
  flex:0 0 5px;
  background:linear-gradient(180deg,#f0d060 0%,#c9a84c 30%,#a07828 60%,#c9a84c 80%,#f0d060 100%);
}

/* Left personal section */
.left{
  flex:1;
  padding:36px 32px 28px;
  display:flex;
  flex-direction:column;
  border-right:1px solid rgba(180,140,40,0.2);
  position:relative;
  background:linear-gradient(135deg,#fdfaf4 60%,#f7f0e0 100%);
}

/* Watermark */
.left::before{
  content:'CH';
  position:absolute;
  right:-10px;bottom:-20px;
  font-family:'Cormorant Garamond',serif;
  font-size:200px;
  font-weight:300;
  color:rgba(180,140,40,0.05);
  line-height:1;
  pointer-events:none;
  user-select:none;
}

.photo-wrapper{
  display:flex;
  align-items:flex-start;
  gap:20px;
  margin-bottom:24px;
}
.avatar-frame{
  position:relative;
  flex:0 0 90px;
}
.avatar-frame::before{
  content:'';
  position:absolute;
  inset:-3px;
  background:linear-gradient(135deg,#f0d060,#c9a84c,#a07828,#c9a84c,#f0d060);
  border-radius:3px;
}
.avatar-frame::after{
  content:'';
  position:absolute;
  inset:-1px;
  background:#fdfaf4;
  border-radius:2px;
}
.avatar{
  position:relative;z-index:1;
  width:90px;height:90px;
  object-fit:cover;
  display:block;
  border-radius:2px;
}
.avatar-fallback{
  display:none;
  position:relative;z-index:1;
  width:90px;height:90px;
  background:#f0e8cc;
  align-items:center;justify-content:center;
  border-radius:2px;
}
.avatar-fallback span{
  font-family:'Cormorant Garamond',serif;
  font-size:32px;color:#a07828;font-weight:300;
}

.name-block{
  padding-top:4px;
}
.name{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;
  font-weight:600;
  color:#1a1408;
  line-height:1.15;
  letter-spacing:0.3px;
}
.name em{
  font-style:italic;
  font-weight:300;
  color:#6b4e10;
}
.role{
  margin-top:8px;
  font-size:9px;
  font-weight:600;
  letter-spacing:3.5px;
  text-transform:uppercase;
  color:#a07828;
}
.gold-rule{
  display:flex;align-items:center;gap:8px;
  margin:20px 0 18px;
}
.rule-line{flex:1;height:1px;background:linear-gradient(90deg,#c9a84c,rgba(180,140,40,0.2));}
.rule-diamond{
  width:5px;height:5px;
  background:#c9a84c;
  transform:rotate(45deg);
  flex:0 0 5px;
}

.contacts{
  display:flex;flex-direction:column;gap:11px;
  flex:1;
}
.contact-row{
  display:flex;align-items:center;gap:10px;
}
.c-icon{
  width:26px;height:26px;
  border-radius:2px;
  border:1px solid rgba(180,140,40,0.3);
  background:rgba(240,220,150,0.15);
  display:flex;align-items:center;justify-content:center;
  flex:0 0 26px;
}
.c-icon svg{width:12px;height:12px;fill:none;stroke:#a07828;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.c-text{
  font-size:11.5px;
  color:#3a2c0a;
  letter-spacing:0.2px;
}
.c-text a{color:#7a5e18;text-decoration:none;}
.c-text a:hover{color:#c9a84c;text-decoration:underline;}

.location{
  margin-top:auto;
  padding-top:16px;
  font-family:'Cormorant Garamond',serif;
  font-size:12px;
  font-style:italic;
  color:rgba(100,75,20,0.5);
  letter-spacing:0.5px;
}

/* Bottom links strip */
.bottom-links{
  position:absolute;
  bottom:0;left:5px;right:0;
  height:60px;
  background:linear-gradient(90deg,#1a1408,#2a2010);
  display:flex;
  align-items:center;
  justify-content:space-around;
  padding:0 20px;
  border-top:1px solid #c9a84c;
}
.link-btn{
  display:flex;align-items:center;gap:8px;
  text-decoration:none;
  cursor:pointer;
  padding:6px 12px;
  border-radius:2px;
  border:1px solid rgba(180,140,40,0.3);
  transition:border-color 0.3s, background 0.3s, transform 0.3s;
  flex:1;
  justify-content:center;
}
.link-btn:not(:last-child){margin-right:8px;}
.link-btn:hover{
  border-color:#c9a84c;
  background:rgba(180,140,40,0.12);
  transform:translateY(-2px);
}
.link-btn svg{width:14px;height:14px;fill:none;stroke:#c9a84c;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex:0 0 14px;}
.link-btn span{
  font-size:9px;
  font-weight:600;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#c9a84c;
}

/* Card needs bottom padding for the strip */
.left{padding-bottom:88px;}

/* Corner ornaments */
.corner{position:absolute;width:24px;height:24px;}
.corner.tl{top:10px;left:10px;border-top:1px solid #c9a84c;border-left:1px solid #c9a84c;}
.corner.tr{top:10px;right:10px;border-top:1px solid #c9a84c;border-right:1px solid #c9a84c;}
.corner.bl{bottom:70px;left:10px;border-bottom:1px solid #c9a84c;border-left:1px solid #c9a84c;}
</style>
</head>
