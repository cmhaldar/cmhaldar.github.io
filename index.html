<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quick Redirect Chandramouli Haldar</title>
  <style>
    :root{
      --bg1: #0f172a;
      --bg2: #0b1220;
      --card: rgba(255,255,255,0.05);
      --accent: linear-gradient(90deg,#7c3aed 0%, #06b6d4 100%);
      --glass: rgba(255,255,255,0.04);
      --glass-2: rgba(255,255,255,0.02);
      --text: #e6eef8;
      --muted: rgba(230,238,248,0.7);
      --shadow: 0 10px 30px rgba(2,6,23,0.6);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    /* Page layout */
    html,body{height:100%;margin:0}
    body{
      display:grid;
      place-items:center;
      background:radial-gradient(1200px 600px at 10% 10%, rgba(124,58,237,0.12), transparent 8%),
                 radial-gradient(1000px 400px at 90% 90%, rgba(6,182,212,0.08), transparent 8%),
                 linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:760px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      box-shadow:var(--shadow);
      padding:28px;
      backdrop-filter: blur(8px) saturate(120%);
      border: 1px solid rgba(255,255,255,0.04);
    }

    .header{
      display:flex;
      gap:16px;
      align-items:center;
    }
    .logo{
      width:64px;height:64px;border-radius:12px;display:grid;place-items:center;
      background:linear-gradient(135deg,#7c3aed,#06b6d4);
      box-shadow: 0 6px 18px rgba(7,12,34,0.6);
      flex:0 0 64px;
    }
    .logo svg{filter:drop-shadow(0 6px 12px rgba(7,12,34,0.5));}

    h1{margin:0;font-size:20px;letter-spacing:0.2px}
    p.lead{margin:6px 0 0;color:var(--muted);font-size:13px}

    .buttons{
      margin-top:20px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:14px;
    }

    .btn{
      --pad:14px 18px;
      display:inline-flex;align-items:center;gap:12px;justify-content:center;
      padding:var(--pad);
      border-radius:12px;
      font-weight:600;
      font-size:15px;
      cursor:pointer;
      border:1px solid transparent;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      transition:transform .18s cubic-bezier(.2,.9,.3,1), box-shadow .18s, border-color .18s;
      user-select:none;
      min-height:56px;
      color:var(--text);
      box-shadow: 0 6px 18px rgba(2,6,23,0.35);
    }

    .btn:focus{outline:3px solid rgba(99,102,241,0.16);outline-offset:3px}

    .btn:hover{transform:translateY(-6px)}
    .btn:active{transform:translateY(-2px)}

    .btn .icon{
      width:36px;height:36px;border-radius:8px;display:grid;place-items:center;font-size:18px;
      background:var(--glass-2);backdrop-filter:blur(4px);
      border:1px solid rgba(255,255,255,0.025);
    }

    /* Specific styles */
    .btn.nova{background: linear-gradient(90deg,#7c3aed, #06b6d4); color:white;}
    .btn.portfolio{background: linear-gradient(90deg,#06b6d4, #60a5fa); color:white;}
    .btn.research{background: linear-gradient(90deg,#10b981, #06b6d4); color:white;}

    /* small description area */
    .meta{margin-top:16px;color:var(--muted);font-size:13px}

    /* footer */
    .foot{margin-top:18px;text-align:center;color:rgba(230,238,248,0.5);font-size:12px}

    /* responsive tweaks */
    @media (max-width:420px){
      .logo{width:52px;height:52px}
      .btn{font-size:14px;padding:12px 14px}
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <div class="header">
      <div class="logo" aria-hidden>
        <!-- simple brand mark -->
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="4" fill="white" fill-opacity="0.06"/>
          <path d="M6 12h12M12 6v12" stroke="white" stroke-opacity="0.9" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <h1>Quick Redirect</h1>
        <p class="lead">Choose a site below to open. Buttons open in a new tab for convenience.</p>
      </div>
    </div>

    <div class="buttons" role="navigation" aria-label="Quick links">
      <button class="btn nova" id="btn-nova" aria-label="Open NovaTech website">
        <span class="icon" aria-hidden>
          <!-- globe icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 0v20M2 12h20" stroke="rgba(255,255,255,0.95)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        NovaTech — novatech-is.in
      </button>

      <button class="btn portfolio" id="btn-portfolio" aria-label="Open portfolio website">
        <span class="icon" aria-hidden>
          <!-- user icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 12a4 4 0 100-8 4 4 0 000 8zM3 21a9 9 0 0118 0" stroke="rgba(255,255,255,0.95)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        My Portfolio
      </button>

      <button class="btn research" id="btn-research" aria-label="Open research website">
        <span class="icon" aria-hidden>
          <!-- document icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 7h6l3 3v7a1 1 0 01-1 1H7a1 1 0 01-1-1V7z" stroke="rgba(255,255,255,0.95)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        Research Profile
      </button>
    </div>

    <p class="foot">Made with ♥ — Chandramouli Haldar</p>
  </main>

  <script>
    // Customize the redirect targets here
    const targets = {
      nova: 'https://novatech-is.in', // NovaTech site
      portfolio: 'https://chandramouli001.github.io/', // replace with your portfolio URL
      research: 'https://chandramouli01.vercel.app' // replace with your research site URL
    };

    // Open in new tab with a11y-friendly behavior
    function openTarget(url){
      // attempt to open in new tab; fallback to same tab if blocked
      const newWin = window.open(url, '_blank', 'noopener,noreferrer');
      if(!newWin) location.href = url;
    }

    document.getElementById('btn-nova').addEventListener('click', ()=> openTarget(targets.nova));
    document.getElementById('btn-portfolio').addEventListener('click', ()=> openTarget(targets.portfolio));
    document.getElementById('btn-research').addEventListener('click', ()=> openTarget(targets.research));

    // Keyboard support: Enter/Space activate focused button (native already handles it for <button>)

    // Optional: allow quick-key shortcuts (N, P, R)
    document.addEventListener('keydown', (e)=>{
      if(e.key === 'n' || e.key === 'N') openTarget(targets.nova);
      if(e.key === 'p' || e.key === 'P') openTarget(targets.portfolio);
      if(e.key === 'r' || e.key === 'R') openTarget(targets.research);
    });
  </script>
</body>
</html>
